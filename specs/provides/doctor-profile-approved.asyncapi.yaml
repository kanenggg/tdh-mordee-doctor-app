asyncapi: 3.1.0
info:
  title: DoctorApp Doctor Profile Approved dependency
  version: 1.0.0
  description: >-
    APMv2 consumes the committed DoctorApp origin/main DoctorProfileApproved
    event. Top-level service configuration is authoritative. schemaVersion,
    profileVersion, and consultationConfig are optional future extensions, not
    required fields of this runtime contract.
defaultContentType: application/json
channels:
  doctor-profile-approved:
    address: doctor-profile.approved
    messages:
      doctorProfileApproved:
        $ref: '#/components/messages/DoctorProfileApproved'
operations:
  consumeDoctorProfileApproved:
    action: receive
    channel:
      $ref: '#/channels/doctor-profile-approved'
    messages:
      - $ref: '#/channels/doctor-profile-approved/messages/doctorProfileApproved'
components:
  messages:
    DoctorProfileApproved:
      name: DoctorProfileApproved
      payload:
        $ref: '#/components/schemas/DoctorProfileApproved'
  schemas:
    Localized:
      type: object
      required: [th, en]
      properties:
        th: { type: string }
        en: { type: string }
    Profession:
      type: object
      required: [id, name, abbr]
      properties:
        id: { type: integer, format: int32 }
        name: { $ref: '#/components/schemas/Localized' }
        abbr: { $ref: '#/components/schemas/Localized' }
    WorkPlace:
      type: object
      required: [id, name]
      properties:
        id: { type: integer, format: int32 }
        name: { $ref: '#/components/schemas/Localized' }
    MedicalSchool:
      type: object
      required: [id, name]
      properties:
        id: { type: integer, format: int32 }
        name: { $ref: '#/components/schemas/Localized' }
    Specialty:
      type: object
      required: [id, name, medicalSchool]
      properties:
        id: { type: integer, format: int32 }
        name: { $ref: '#/components/schemas/Localized' }
        subspecialty:
          anyOf:
            - $ref: '#/components/schemas/Specialty'
            - type: 'null'
        medicalSchool: { $ref: '#/components/schemas/MedicalSchool' }
    AcademicPosition:
      type: object
      required: [id, name, abbr]
      properties:
        id: { type: integer, format: int32 }
        name: { $ref: '#/components/schemas/Localized' }
        abbr: { $ref: '#/components/schemas/Localized' }
    ConsultationConfigExtension:
      type: object
      required: [channels, languages, durationMinutes, feeAmount, currency]
      properties:
        channels:
          type: array
          items: { type: string, enum: [video, voice, chat] }
        languages:
          type: array
          items: { type: string, enum: [th, en] }
        durationMinutes: { type: integer, enum: [15, 25, 50] }
        feeAmount: { type: string, pattern: '^[0-9]+\.[0-9]{2}$' }
        currency: { type: string, minLength: 1 }
    DoctorProfileApproved:
      type: object
      required:
        - __type
        - eventId
        - doctorId
        - doctorAccountId
        - doctorProfileId
        - departmentId
        - department
        - counselingAreas
        - isActive
        - profession
        - specialty
        - workPlace
        - academicPosition
        - firstName
        - lastName
        - profileImageUrl
        - doctorFee
        - doctorFeeCurrency
        - languages
        - durationMinutes
        - channels
        - approvedAt
        - occurredAt
      properties:
        __type: { const: DoctorProfileApproved }
        eventId: { type: string }
        doctorId: { type: string, format: uuid }
        doctorAccountId: { type: integer, format: int32 }
        doctorProfileId: { type: integer, format: int32 }
        departmentId: { type: integer, format: int32 }
        department: { $ref: '#/components/schemas/Localized' }
        counselingAreas:
          type: array
          items: { $ref: '#/components/schemas/Localized' }
        isActive: { type: boolean }
        profession: { $ref: '#/components/schemas/Profession' }
        specialty: { $ref: '#/components/schemas/Specialty' }
        workPlace:
          type: array
          items: { $ref: '#/components/schemas/WorkPlace' }
        academicPosition: { $ref: '#/components/schemas/AcademicPosition' }
        firstName: { $ref: '#/components/schemas/Localized' }
        lastName: { $ref: '#/components/schemas/Localized' }
        profileImageUrl: { type: string }
        doctorFee: { type: integer, format: int32, minimum: 0 }
        doctorFeeCurrency: { type: string, minLength: 1 }
        languages:
          type: array
          minItems: 1
          items: { type: string, enum: [th, en] }
        durationMinutes: { type: integer, enum: [15, 25, 50] }
        channels:
          type: array
          minItems: 1
          items: { type: string, enum: [video, voice, chat] }
        approvedAt: { type: integer, format: int64 }
        occurredAt: { type: integer, format: int64 }
        schemaVersion: { type: integer, format: int32 }
        profileVersion: { type: integer, format: int64, minimum: 1 }
        consultationConfig: { $ref: '#/components/schemas/ConsultationConfigExtension' }
