syntax = "proto3";

package tdh.protocol.common;

// UserIdentity - comprehensive user identifier information
message UserIdentity {
  int32 account_id = 1;
  int32 account_type = 2;
  int32 user_profile_id = 3;
  int32 user_main_profile_id = 4;
  int32 tenant_id = 5;
  string oidc_user_id = 6;  // Optional field
  LegacyData legacy_data = 7;  // Optional field - legacy compatibility

  // Legacy data for backward compatibility with legacy headers
  message LegacyData {
    string user_id = 1;
    int32 uid = 2;
    string client_id = 3;
    int32 client_int_id = 4;
    string scopes = 5;
    string role_code = 6;
  }
}
