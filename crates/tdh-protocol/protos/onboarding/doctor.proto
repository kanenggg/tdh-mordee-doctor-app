syntax = "proto3";

package tdh.protocol.onboarding;

import "common/consulting.proto";
import "common/localization.proto";

// OnBoardingStatus - discriminated union with variant-specific data
message OnBoardingStatus {
  oneof status {
    Draft draft = 1;
    PendingApproval pending_approval = 2;
    CancelledByUser cancelled_by_user = 3;
    Approved approved = 4;
    Rejected rejected = 5;
    Deactivated deactivated = 6;
  }
}

message Draft {}
message PendingApproval {}
message CancelledByUser {}
message Approved {}
message Rejected {
  string reason = 1;
}
message Deactivated {
  string reason = 1;
}

// Name structure
message Name {
  string firstname = 1;
  string lastname = 2;
}

// Address structure
message Address {
  string address_detail = 1;
  string sub_district = 2;
  string district = 3;
  string province = 4;
  string postal_code = 5;
}

// Work place structure
message WorkPlace {
  int32 id = 1;
  string name = 2;
}

message SelectedWorkPlace {
  repeated WorkPlace primary = 1;
  repeated WorkPlace additional = 2;
}

// Specialty structure
message Specialty {
  int32 id = 1;
  string name = 2;
  string specialty_type = 3;
  string medical_school = 4;
}

// Education structure
message Education {
  string license_number = 1;
  string medical_school = 2;
  repeated Specialty specialties = 3;
  repeated Specialty additional_specialties = 4;
  repeated string special_interests = 5;
}

// Documents structure
message Documents {
  string profile_image_url = 1;
  string id_card_image_url = 2;
  string book_bank_image_url = 3;
  string med_license_image_url = 4;
  repeated string certificate_image_urls = 5;
}

// Main OnBoardingInfo message
message OnBoardingInfo {
  common.ConsultationChannel profession = 1;
  OnBoardingStatus status = 2;
  string academic_position = 3;
  string citizen_id = 4;
  tdh.protocol.common.LocalizedString name = 5;
  Address address = 6;
  SelectedWorkPlace work_place = 7;
  Education education = 8;
  Documents documents = 9;
}
