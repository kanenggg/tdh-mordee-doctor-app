---
apiVersion: backstage.io/v1alpha1
kind: Resource
metadata:
  name: doctor-postgresql
  description: PostgreSQL data store for doctor domain data.
spec:
  type: database
  owner: P.bank
  system: doctor

---
apiVersion: backstage.io/v1alpha1
kind: Resource
metadata:
  name: doctor-redis
  description: Redis cache used by the doctor services.
spec:
  type: cache
  owner: P.bank
  system: doctor

---
apiVersion: backstage.io/v1alpha1
kind: Resource
metadata:
  name: doctor-firestore
  description: Firestore document store used by the doctor services.
spec:
  type: database
  owner: P.bank
  system: doctor

---
apiVersion: backstage.io/v1alpha1
kind: Resource
metadata:
  name: doctor-firebase-rtdb
  description: Firebase Realtime Database used for real-time doctor workflows.
spec:
  type: database
  owner: P.bank
  system: doctor

---
apiVersion: backstage.io/v1alpha1
kind: Resource
metadata:
  name: doctor-pubsub
  description: GCP Pub/Sub resources used for doctor background events.
spec:
  type: message-broker
  owner: P.bank
  system: doctor

---
apiVersion: backstage.io/v1alpha1
kind: Resource
metadata:
  name: doctor-cloud-tasks
  description: GCP Cloud Tasks queues used for scheduled background work.
spec:
  type: queue
  owner: P.bank
  system: doctor
