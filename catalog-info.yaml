apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: tdh-mordee-doctor-app
  title: TDH MorDee Doctor API
  description: >-
    Doctor-facing telehealth API gateway for appointments, consultations,
    notifications, onboarding, doctor profiles, EHR, ranking, and timeslots.
  annotations:
    github.com/project-slug: kanenggg/tdh-mordee-doctor-app
    # TODO: Uncomment when the deployment namespace and workload name are known.
    # backstage.io/kubernetes-id: <kubernetes-workload-name>
    # backstage.io/kubernetes-namespace: <kubernetes-namespace>
    # TODO: Uncomment when the Argo CD application name is known.
    # argocd/app-name: <argocd-application-name>
    # TODO: Uncomment when the SonarQube project key is known.
    # sonarqube.org/project-key: <sonarqube-project-key>
    # TODO: Uncomment after TechDocs and mkdocs.yml are configured in this repo.
    # backstage.io/techdocs-ref: dir:.
  tags:
    - rust
    - axum
    - telehealth
    - doctor
  links:
    - url: https://github.com/kanenggg/tdh-mordee-doctor-app/tree/main/docs/CODEMAPS
      title: Architecture Documentation
      icon: docs
spec:
  type: service
  lifecycle: production
  owner: user:default/p-bank
  system: doctor
  providesApis:
    - tdh-mordee-doctor-api
    - doctor-profile-events
  consumesApis:
    - consultation-rs-api
    - biz-apm-published-events
  dependsOn:
    - resource:doctor-postgresql
    - resource:doctor-redis
    - resource:doctor-firestore
    - resource:doctor-firebase-rtdb

