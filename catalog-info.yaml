apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: tdh-mordee-doctor-api
  title: TDH MorDee Doctor API
  description: HTTP API exposed by the TDH MorDee Doctor service.
  tags:
    - rest
    - openapi
    - doctor
spec:
  type: openapi
  lifecycle: production
  owner: P.bank
  system: doctor
  definition: |
    openapi: 3.0.3
    info:
      title: TDH MorDee Doctor API
      version: 1.0.0
      description: >-
        The complete OpenAPI document is generated by the service at runtime
        and is available from /api-docs/openapi.json.
