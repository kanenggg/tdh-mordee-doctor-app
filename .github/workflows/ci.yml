name: Backstage Catalog Sync

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write

env:
  PYTHONDONTWRITEBYTECODE: "1"

concurrency:
  group: backstage-catalog-sync-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync-catalog:
    runs-on: [self-hosted, macOS, ARM64]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main
          submodules: recursive

      - name: Setup Python dependencies
        run: |
          python3 --version
          python3 -m venv .venv
          .venv/bin/python -m pip install pyyaml
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: . -> target

      - name: Test shared catalog CI
        run: python .github/scripts/test_catalog_ci.py -v

      - name: Sync main before generation
        run: git pull --rebase origin main

      - name: Generate OpenAPI specifications
        run: python .github/scripts/catalog_ci.py generate-openapi

      - name: Validate OpenAPI specifications
        run: python .github/scripts/catalog_ci.py validate-openapi

      - name: Commit updated OpenAPI specifications
        run: |
          if ! python .github/scripts/catalog_ci.py artifacts-changed; then
            echo "✅ OpenAPI specifications are already up to date"
            exit 0
          fi

          while IFS= read -r artifact; do
            git add -- "$artifact"
          done < <(python .github/scripts/catalog_ci.py artifact-paths)

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "docs(openapi): update generated specifications [skip ci]"
          git push origin HEAD:main

      - name: Parse and validate all catalogs
        run: |
          python .github/scripts/catalog_ci.py catalog-result --output /tmp/catalog_result.json
          cat /tmp/catalog_result.json

      - name: Register catalog and refresh every entity
        env:
          BACKSTAGE_URL: ${{ secrets.BACKSTAGE_URL }}
          BACKSTAGE_TOKEN: ${{ secrets.BACKSTAGE_TOKEN }}
          CATALOG_LOCATION_URL: ${{ github.server_url }}/${{ github.repository }}/blob/${{ github.ref_name }}/catalog-info.yaml
        run: |
          if [ -z "$BACKSTAGE_URL" ] || [ -z "$BACKSTAGE_TOKEN" ]; then
            echo "::warning::Skipping Backstage registration and refresh because BACKSTAGE_URL or BACKSTAGE_TOKEN is not configured"
            exit 0
          fi

          BACKSTAGE_URL="${BACKSTAGE_URL%/}"
          if REGISTER_CODE=$(curl -sS -o /tmp/register_resp.json -w "%{http_code}" \
            --connect-timeout 10 --max-time 30 --retry 3 --retry-delay 2 \
            -X POST "$BACKSTAGE_URL/api/catalog/locations" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $BACKSTAGE_TOKEN" \
            -d "{\"type\":\"url\",\"target\":\"$CATALOG_LOCATION_URL\"}"); then
            :
          else
            CURL_EXIT=$?
            echo "❌ Cannot connect to Backstage location API (curl exit $CURL_EXIT)"
            exit 1
          fi

          if [ "$REGISTER_CODE" -ge 200 ] && [ "$REGISTER_CODE" -lt 300 ]; then
            echo "✅ Catalog location registered ($REGISTER_CODE)"
          elif [ "$REGISTER_CODE" -eq 409 ]; then
            echo "✅ Catalog location already registered ($REGISTER_CODE)"
          else
            echo "❌ Catalog registration failed ($REGISTER_CODE): $(cat /tmp/register_resp.json)"
            exit 1
          fi

          FAILED=0
          while IFS= read -r ref; do
            echo "🔄 Refreshing: $ref"
            if HTTP_CODE=$(curl -sS -o /tmp/refresh_resp.json -w "%{http_code}" \
              --connect-timeout 10 --max-time 30 --retry 3 --retry-delay 2 \
              -X POST "$BACKSTAGE_URL/api/catalog/refresh" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer $BACKSTAGE_TOKEN" \
              -d "{\"entityRef\":\"$ref\"}"); then
              :
            else
              CURL_EXIT=$?
              echo "  ❌ Cannot connect to Backstage (curl exit $CURL_EXIT)"
              FAILED=1
              continue
            fi

            if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
              echo "  ✅ OK ($HTTP_CODE)"
            else
              echo "  ❌ Refresh failed ($HTTP_CODE): $(cat /tmp/refresh_resp.json)"
              FAILED=1
            fi
          done < <(python -c 'import json; print("\n".join(json.load(open("/tmp/catalog_result.json"))["entity_refs"]))')

          [ "$FAILED" -eq 0 ] || exit 1

      - name: Summary
        if: always()
        run: python .github/scripts/catalog_ci.py summary --result /tmp/catalog_result.json >> "$GITHUB_STEP_SUMMARY"
