---
openapi: 3.1.0
components:
  schemas:
    CreatePrescriptionResponse:
      type: object
      oneOf:
      - $ref: "#/components/schemas/CreatePrescriptionSuccess"
      discriminator:
        propertyName: __type
        mapping:
          Success: "#/components/schemas/CreatePrescriptionSuccess"
    CreatePrescriptionSuccess:
      type: object
      required:
      - prescriptionId
      - prescriptionCode
      description: Successful prescription creation response
      properties:
        prescriptionId:
          type: integer
          format: int32
        prescriptionCode:
          type: string
    NotFound:
      type: object
      description: Prescription not found
      properties:
        value:
          type:
          - string
          - "null"
    OffsetDateTime:
      type: string
      format: date-time
      examples:
      - 2022-03-10T12:15:50-04:00
    Prescription:
      type: object
      required:
      - prescriptionId
      - bookingId
      - bizUnitId
      - bizCenterId
      - doctorId
      - patientId
      - prescriptionCode
      - prescriptionExpiredAt
      - acknowledgeAllergy
      - allergies
      - totalAmount
      - items
      description: Prescription details
      properties:
        prescriptionId:
          type: integer
          format: int32
        bookingId:
          type: string
        bizUnitId:
          type: integer
          format: int32
        bizCenterId:
          type: integer
          format: int32
        doctorId:
          type: string
        patientId:
          type: integer
          format: int32
        prescriptionCode:
          type:
          - string
          - "null"
        prescriptionExpiredAt:
          anyOf:
          - $ref: "#/components/schemas/OffsetDateTime"
          - type: "null"
        acknowledgeAllergy:
          type: boolean
        allergies:
          type:
          - array
          - "null"
          items:
            $ref: "#/components/schemas/RefData"
        totalAmount:
          type:
          - number
          - "null"
          format: double
        items:
          type: array
          items:
            $ref: "#/components/schemas/PrescriptionItemResponse"
    PrescriptionItemRequest:
      type: object
      required:
      - pricePlanId
      - medicineId
      - medicineName
      - dose
      - quantity
      - route
      - frequency
      - indication
      - mealInstruction
      - duration
      - cautions
      - remark
      - noteToPatient
      - unitPrice
      properties:
        pricePlanId:
          type: integer
          format: int32
        medicineId:
          type: integer
          format: int32
        medicineName:
          type: string
        dose:
          $ref: "#/components/schemas/RefDataWithAmountInteger"
        quantity:
          type: integer
          format: int32
        route:
          $ref: "#/components/schemas/RefData"
        frequency:
          $ref: "#/components/schemas/RefData"
        indication:
          $ref: "#/components/schemas/RefData"
        mealInstruction:
          $ref: "#/components/schemas/RefData"
        duration:
          $ref: "#/components/schemas/RefDataWithAmountInteger"
        cautions:
          type:
          - string
          - "null"
        remark:
          type:
          - string
          - "null"
        noteToPatient:
          type:
          - string
          - "null"
        unitPrice:
          type: number
          format: double
    PrescriptionItemResponse:
      type: object
      required:
      - prescriptionItemId
      - medicineId
      - pricePlanId
      - medicineName
      - dosage
      - dose
      - route
      - frequency
      - duration
      - durationUnit
      - indication
      - mealInstruction
      - container
      - caution
      - remark
      - patientDetail
      - unitCost
      - totalAmount
      description: Prescription item details
      properties:
        prescriptionItemId:
          type: integer
          format: int32
        medicineId:
          type: integer
          format: int32
        pricePlanId:
          type: integer
          format: int32
        medicineName:
          type: string
        dosage:
          type: integer
          format: int32
        dose:
          anyOf:
          - $ref: "#/components/schemas/RefData"
          - type: "null"
        route:
          anyOf:
          - $ref: "#/components/schemas/RefData"
          - type: "null"
        frequency:
          anyOf:
          - $ref: "#/components/schemas/RefData"
          - type: "null"
        duration:
          type: integer
          format: int32
        durationUnit:
          anyOf:
          - $ref: "#/components/schemas/RefData"
          - type: "null"
        indication:
          anyOf:
          - $ref: "#/components/schemas/RefData"
          - type: "null"
        mealInstruction:
          anyOf:
          - $ref: "#/components/schemas/RefData"
          - type: "null"
        container:
          anyOf:
          - $ref: "#/components/schemas/RefData"
          - type: "null"
        caution:
          type:
          - string
          - "null"
        remark:
          type:
          - string
          - "null"
        patientDetail:
          type:
          - string
          - "null"
        unitCost:
          type: number
          format: double
        totalAmount:
          type: number
          format: double
    PrescriptionRequest:
      type: object
      required:
      - bookingId
      - bizUnitId
      - bizCenterId
      - doctorId
      - patientId
      - prescriptionCode
      - prescriptionExpiredAt
      - acknowledgeAllergy
      - allergies
      - items
      properties:
        bookingId:
          type: string
        bizUnitId:
          type: integer
          format: int32
        bizCenterId:
          type: integer
          format: int32
        doctorId:
          type: string
        patientId:
          type: integer
          format: int32
        prescriptionCode:
          type:
          - string
          - "null"
        prescriptionExpiredAt:
          type:
          - integer
          - "null"
          format: int64
        acknowledgeAllergy:
          type:
          - boolean
          - "null"
        allergies:
          type:
          - array
          - "null"
          items:
            type: integer
            format: int32
        items:
          type:
          - array
          - "null"
          items:
            $ref: "#/components/schemas/PrescriptionItemRequest"
    PrescriptionResponse:
      type: object
      oneOf:
      - $ref: "#/components/schemas/Prescription"
      - $ref: "#/components/schemas/NotFound"
      discriminator:
        propertyName: __type
        mapping:
          Prescription: "#/components/schemas/Prescription"
          NotFound: "#/components/schemas/NotFound"
    RefData:
      type: object
      required:
      - id
      - description
      properties:
        id:
          type: integer
          format: int32
        description:
          type: string
    RefDataWithAmountInteger:
      type: object
      required:
      - id
      - value
      - unit
      properties:
        id:
          type: integer
          format: int32
        value:
          type: integer
          format: int32
        unit:
          type: string
tags:
- name: Prescription
  description: Prescription management operations
paths:
  /prescription/create:
    post:
      summary: Create a prescription
      description: Creates a new prescription for a booking with medication items
      tags:
      - Prescription
      requestBody:
        description: Prescription details
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PrescriptionRequest"
        required: true
      responses:
        "200":
          description: Prescription created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatePrescriptionResponse"
        "400":
          description: Bad Request
  /prescription/{booking_id}:
    get:
      summary: Get a prescription by booking ID
      description: Retrieves a prescription associated with the given booking ID
      tags:
      - Prescription
      parameters:
      - description: The booking ID to look up the prescription for
        name: booking_id
        required: true
        in: path
        schema:
          type: string
      responses:
        "200":
          description: Prescription found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrescriptionResponse"
info:
  title: Prescription API
  version: 1.0.0
  description: REST API for prescription management
